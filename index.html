<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>JJC Exchange Market</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:1000px;
margin:auto;
}

h1{
margin-top:30px;
}

.price{
font-size:40px;
font-weight:bold;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-top:10px;
}

.stat{
background:#151a2c;
padding:10px 20px;
border-radius:5px;
}

button{
margin:10px;
padding:8px 20px;
background:#1e2438;
color:white;
border:1px solid #444;
cursor:pointer;
}

canvas{
background:#111;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>JJC Exchange Market</h1>

<div class="price">
1 JJC = <span id="rate">Loading...</span> JPY
</div>

<div class="stats">

<div class="stat">
24h Change
<br>
<span id="change">-</span>
</div>

<div class="stat">
24h High
<br>
<span id="high">-</span>
</div>

<div class="stat">
24h Low
<br>
<span id="low">-</span>
</div>

</div>

<button onclick="setRange('24h')">24H</button>
<button onclick="setRange('7d')">7D</button>

<canvas id="chart" height="400"></canvas>

</div>

<script>

let candles=[];
let prices=[];
let range="24h";

const ctx=document.getElementById("chart").getContext("2d");

const chart=new Chart(ctx,{
type:'candlestick',
data:{
datasets:[{
label:'JJC / JPY',
data:candles
}]
},
options:{
animation:false
}
});

function setRange(r){

range=r;
drawChart();

}

function drawChart(){

let limit = range==="24h"?1440:10080;

let data=candles.slice(-limit);

chart.data.datasets[0].data=data;

chart.update();

}

async function updateRate(){

try{

const res=await fetch("https://open.er-api.com/v6/latest/USD");

const data=await res.json();

const usd_jpy=data.rates.JPY;
const usd_eur=data.rates.EUR;

const eur_usd=1/usd_eur;
const eur_jpy=eur_usd*usd_jpy;

/* 基準値 */

const USD0=158.26;
const EUR0=183.99;
const EURUSD0=1.1627;

let jjc=

100*
Math.pow(usd_jpy/USD0,1/3)*
Math.pow(eur_jpy/EUR0,1/3)*
Math.pow(eur_usd/EURUSD0,1/3);

document.getElementById("rate").innerText=jjc.toFixed(2);

prices.push(jjc);

if(prices.length>1440){
prices.shift();
}

/* 高値安値 */

let high=Math.max(...prices);
let low=Math.min(...prices);

document.getElementById("high").innerText=high.toFixed(2);
document.getElementById("low").innerText=low.toFixed(2);

/* 変動率 */

let change=((jjc-prices[0])/prices[0])*100;

document.getElementById("change").innerText=change.toFixed(2)+"%";

/* ローソク足 */

let candle={
x:Date.now(),
o:jjc,
h:jjc,
l:jjc,
c:jjc
};

candles.push(candle);

if(candles.length>10080){
candles.shift();
}

drawChart();

}catch(e){

document.getElementById("rate").innerText="API ERROR";

}

}

updateRate();

setInterval(updateRate,60000);

</script>

</body>

</html>
